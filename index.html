<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trico Janitorial Service | Management System</title>
    <!-- Modern Font: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Core Design System -->
    <style>
:root {
    /* Color Variables */
    --bg-dark: #0f172a;        /* Deep slate/navy for premium look */
    --bg-surface: #1e293b;     /* Card background */
    --bg-glass: rgba(30, 41, 59, 0.7);
    --border-glass: rgba(255, 255, 255, 0.1);
    
    --primary: #06b6d4;        /* Vibrant cyan for trust/cleanliness */
    --primary-hover: #0891b2;
    --secondary: #3b82f6;      /* Rich royal blue accent */
    
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    
    --danger: #ef4444;
    --success: #10b981;
    --warning: #f59e0b;
    
    /* Layout & Sizing */
    --radius-sm: 0.375rem;
    --radius-md: 0.75rem;
    --radius-lg: 1.5rem;
    
    /* Shadows */
    --shadow-glow: 0 0 20px rgba(6, 182, 212, 0.3);
    --shadow-card: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
    
    /* Transitions */
    --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    --transition-smooth: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

/* CSS Reset & Global Typography */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Outfit', sans-serif;
}

body {
    background-color: var(--bg-dark);
    color: var(--text-main);
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
}

h1, h2, h3, h4, h5, h6 {
    color: var(--text-main);
    font-weight: 600;
}

a {
    color: var(--primary);
    text-decoration: none;
    transition: color var(--transition-fast);
}

a:hover {
    color: var(--primary-hover);
}

/* Base App Container */
#app-root {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* ================== COMPONENTS ================== */

/* Container for Auth Screens */
.auth-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at top right, #1e3a8a 0%, var(--bg-dark) 50%);
    position: relative;
    overflow: hidden;
    padding: 1rem;
}

/* Glassmorphism Card Element */
.glass-card {
    background: var(--bg-glass);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border-glass);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    padding: 2.5rem;
    position: relative;
    z-index: 10;
}

/* Forms & Inputs */
.form-group {
    margin-bottom: 1.5rem;
}

.form-label {
    display: block;
    font-size: 0.875rem;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
    font-weight: 500;
}

.input-wrapper {
    position: relative;
    width: 100%;
}

.input-icon {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    width: 1.25rem;
    height: 1.25rem;
    z-index: 2;
    pointer-events: none;
    transition: color var(--transition-fast);
}

.form-input {
    width: 100%;
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid var(--border-glass);
    color: var(--text-main);
    padding: 0.75rem 1rem 0.75rem 2.85rem;
    border-radius: var(--radius-md);
    font-size: 1rem;
    transition: all var(--transition-fast);
    outline: none;
}

.form-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.15);
    background: rgba(15, 23, 42, 0.8);
}

.form-input:focus ~ .input-icon,
.form-input:not(:placeholder-shown) ~ .input-icon {
    color: var(--primary);
}

/* Buttons */
.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.75rem 1.5rem;
    border-radius: var(--radius-md);
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    transition: all var(--transition-fast);
    border: none;
    outline: none;
}

.btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-glow);
}

.btn-primary:active {
    transform: translateY(0);
}

/* Animations */
.animate-fade-in {
    animation: fadeIn var(--transition-smooth);
}

.animate-slide-up {
    animation: slideUp var(--transition-smooth);
}

.animate-spin {
    animation: spin 1s linear infinite;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* Abstract Background Shapes for Login */
.bg-shape {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    z-index: 1;
    animation: float 10s infinite ease-in-out;
}

.bg-shape-1 {
    width: 400px;
    height: 400px;
    background: rgba(6, 182, 212, 0.2);
    top: -100px;
    left: -100px;
    animation-delay: 0s;
}

.bg-shape-2 {
    width: 300px;
    height: 300px;
    background: rgba(59, 130, 246, 0.2);
    bottom: -50px;
    right: -50px;
    animation-delay: -5s;
}

@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-30px); }
}

</style>
    <style>
/* Dashboard General Layout */
.app-container {
    display: flex;
    min-height: 100vh;
    width: 100vw;
    background-color: var(--bg-dark);
}

/* Sidebar Styling */
.sidebar {
    width: 260px;
    background-color: var(--bg-surface);
    border-right: 1px solid var(--border-glass);
    display: flex;
    flex-direction: column;
    padding: 1.5rem 1rem;
    position: fixed;
    height: 100vh;
    z-index: 50;
}

.sidebar-header {
    display: flex;
    align-items: center;
    margin-bottom: 2.5rem;
    padding: 0 0.5rem;
}

.sidebar-nav {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.nav-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.85rem 1rem;
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-weight: 500;
    transition: all var(--transition-fast);
}

.nav-item:hover {
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-main);
    transform: translateX(4px);
}

.nav-item.active {
    background: rgba(6, 182, 212, 0.1);
    color: var(--primary);
    border-right: 3px solid var(--primary);
}

.text-danger { color: var(--danger); }
.text-danger:hover { background: rgba(239, 68, 68, 0.1); color: var(--danger); transform: none; }

/* Main Content Wrapper */
.main-content {
    flex: 1;
    margin-left: 260px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    background: radial-gradient(ellipse at top left, rgba(30, 41, 59, 0.5) 0%, transparent 60%);
    transition: margin-left var(--transition-smooth);
}

/* --- RESPONSIVE OVERRIDES --- */

/* Mobile Menu Button - Hidden on Desktop */
.menu-toggle {
    display: none;
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 0.5rem;
    align-items: center;
    justify-content: center;
}

/* Sidebar Overlay for Mobile */
.sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(4px);
    z-index: 45;
}

@media (max-width: 1024px) {
    .grid-cards { grid-template-columns: repeat(2, 1fr); }
    .sidebar { width: 240px; }
    .main-content { margin-left: 240px; }
}

@media (max-width: 768px) {
    .sidebar {
        transform: translateX(-100%);
        transition: transform var(--transition-smooth);
        width: 280px;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar.open + .sidebar-overlay { display: block; }
    
    .main-content { margin-left: 0; }
    
    .top-header { padding: 0 1rem; }
    .header-search { display: none; } /* Hide search on mobile header to save space */
    
    .menu-toggle { display: flex; }
    
    .grid-cards { grid-template-columns: 1fr; }
    
    .stat-card { padding: 1.25rem; }
    
    div[style*="grid-template-columns: 2fr 1fr"] {
        grid-template-columns: 1fr !important;
    }
    
    .glass-card { padding: 1.5rem; }
    
    .auth-container .glass-card { padding: 1.5rem; }
}

/* Header Styling */
.top-header {
    height: 70px;
    background-color: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-glass);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    position: sticky;
    top: 0;
    z-index: 40;
}

.header-search { position: relative; width: 320px; }
.search-input {
    width: 100%;
    background: rgba(30, 41, 59, 0.6);
    border: 1px solid var(--border-glass);
    color: var(--text-main);
    padding: 0.5rem 1rem 0.5rem 2.5rem;
    border-radius: var(--radius-lg);
    font-size: 0.9rem;
    outline: none;
    transition: all var(--transition-fast);
}
.search-input:focus { border-color: var(--primary); background: rgba(30, 41, 59, 1); box-shadow: 0 0 0 3px rgba(6,182,212,0.1); }

.header-actions { display: flex; align-items: center; gap: 1.5rem; }

.icon-btn {
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    position: relative;
    padding: 0.5rem;
    border-radius: 50%;
    transition: all var(--transition-fast);
    display: flex;
    align-items: center;
    justify-content: center;
}
.icon-btn:hover { color: var(--text-main); background: rgba(255, 255, 255, 0.05); }

.badge {
    position: absolute;
    top: 2px; right: 2px;
    background: var(--danger);
    color: white;
    font-size: 0.6rem;
    font-weight: bold;
    min-width: 16px;
    height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    border: 2px solid var(--bg-dark);
}

.user-profile { display: flex; align-items: center; gap: 0.75rem; cursor: pointer; padding: 0.4rem; border-radius: 20px; transition: background 0.2s; }
.user-profile:hover { background: rgba(255,255,255,0.05); }
.avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; flex-shrink: 0; }
.user-info { display: flex; flex-direction: column; }
.user-name { font-size: 0.9rem; font-weight: 600; }
.user-role { font-size: 0.75rem; color: var(--text-muted); }

.page-content { padding: 2rem; flex: 1; overflow-y: auto; }

/* Dashboard Cards Grid */
.grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }

.stat-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-glass);
    border-radius: var(--radius-md);
    padding: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.25rem;
    position: relative;
    overflow: hidden;
    transition: transform var(--transition-fast), box-shadow var(--transition-fast);
}
.stat-card::after {
    content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px;
    background: linear-gradient(90deg, transparent, currentColor, transparent);
    opacity: 0.3;
}
.stat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-card); }

.stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.stat-icon.cyan { background: rgba(6, 182, 212, 0.15); color: var(--primary); }
.stat-icon.green { background: rgba(16, 185, 129, 0.15); color: var(--success); }
.stat-icon.blue { background: rgba(59, 130, 246, 0.15); color: var(--secondary); }
.stat-icon.orange { background: rgba(245, 158, 11, 0.15); color: var(--warning); }

.stat-info h4 { color: var(--text-muted); font-size: 0.85rem; font-weight: 500; margin-bottom: 0.25rem; }
.stat-info h2 { font-size: 1.85rem; font-weight: 700; color: var(--text-main); line-height: 1; }

</style>
</head>

    <!-- Application Script -->
    <script>
window.toggleSidebar = function() {
    document.getElementById('app-sidebar').classList.toggle('open');
};
window.closeSidebar = function() {
    document.getElementById('app-sidebar').classList.remove('open');
};

// --- STATE & DATA ---
const mockEmployees = [
    { id: 'EMP001', name: 'Kamal Silva', nic: '19851234567V', role: 'Supervisor', site: 'Office Block A', status: 'Active', payroll: { basic: 45000, otHours: 12, otRate: 250, deductions: 1500 } },
    { id: 'EMP002', name: 'Nimal Perera', nic: '19901234567V', role: 'Cleaner', site: 'Apartment Complex B', status: 'Active', payroll: { basic: 35000, otHours: 8, otRate: 250, deductions: 1500 } },
    { id: 'EMP003', name: 'Sunita Menike', nic: '19821234567V', role: 'Cleaner', site: 'City Mall', status: 'Active', payroll: { basic: 35000, otHours: 0, otRate: 250, deductions: 1500 } },
    { id: 'EMP004', name: 'Ruwan Kumara', nic: '19951234567V', role: 'Utility Staff', site: 'City Mall', status: 'On Leave', payroll: { basic: 35000, otHours: 0, otRate: 250, deductions: 1500 } },
    { id: 'EMP005', name: 'Saman Kumara', nic: '19911234567V', role: 'Cleaner', site: 'Tech Park Z', status: 'Active', payroll: { basic: 35000, otHours: 15, otRate: 250, deductions: 1500 } },
];

window.currentCalDate = new Date();
window.sriLankaHolidays = {};

window.changeCalendarMonth = function(offset) {
    window.currentCalDate.setMonth(window.currentCalDate.getMonth() + offset);
    window.renderCalendar(window.currentCalDate.getFullYear(), window.currentCalDate.getMonth());
};

const initialInventory = [
    { id: 'INV001', name: 'Floor Cleaner (5L)', category: 'Consumables', quantity: 15, unit: 'Liters', minThreshold: 5, lastRestocked: '2026-03-01' },
    { id: 'INV002', name: 'Microfiber Cloths', category: 'Equipment', quantity: 45, unit: 'Pieces', minThreshold: 10, lastRestocked: '2026-02-15' },
    { id: 'INV003', name: 'Dish Soap', category: 'Consumables', quantity: 4, unit: 'Bottles', minThreshold: 5, lastRestocked: '2026-03-10' },
    { id: 'INV004', name: 'Safety Goggles', category: 'Safety', quantity: 12, unit: 'Pairs', minThreshold: 2, lastRestocked: '2026-01-20' },
    { id: 'INV005', name: 'Heavy Duty Mops', category: 'Equipment', quantity: 2, unit: 'Pieces', minThreshold: 3, lastRestocked: '2026-03-05' }
];

if (!localStorage.getItem('inventory_data')) {
    localStorage.setItem('inventory_data', JSON.stringify(initialInventory));
}

window.getInventory = function() {
    return JSON.parse(localStorage.getItem('inventory_data'));
};

const initialCashBook = [
    { date: '2026-03-01', description: 'ආරම්භක ශේෂය', income: 50000, expense: 0 },
    { date: '2026-03-02', description: 'සේවා ගාස්තු ලැබීම', income: 15000, expense: 0 },
    { date: '2026-03-03', description: 'පිරිසිදු කිරීමේ ද්‍රව්‍ය මිලදී ගැනීම', income: 0, expense: 4500 }
];

if (!localStorage.getItem('cashbook_data')) {
    localStorage.setItem('cashbook_data', JSON.stringify(initialCashBook));
}

window.getCashBook = function() {
    return JSON.parse(localStorage.getItem('cashbook_data'));
};

window.openDateNote = function(dateStr, isHoliday, holidayName) {
    const noteKey = 'note_' + dateStr;
    const existing = localStorage.getItem(noteKey) || '';
    
    let modal = document.getElementById('date-note-modal');
    if (!modal) {
        modal = document.createElement('div');
        modal.id = 'date-note-modal';
        modal.style = "position: fixed; inset: 0; background: rgba(15,23,42,0.8); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: center; justify-content: center;";
        document.body.appendChild(modal);
    }
    
    const banner = isHoliday ? '<div style="background: rgba(239,68,68,0.15); color: #ef4444; padding: 0.5rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem;"><i data-lucide="calendar-heart" style="width:16px;height:16px;"></i> ' + holidayName + '</div>' : '';
    
    modal.innerHTML = `
        <div class="glass-card animate-slide-up" style="width: 100%; max-width: 400px; padding: 2rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h3 style="font-size: 1.25rem;">Notes for ${dateStr}</h3>
                <button type="button" onclick="document.getElementById('date-note-modal').style.display='none'" class="icon-btn"><i data-lucide="x"></i></button>
            </div>
            ${banner}
            <textarea id="note-input" class="form-input" style="height: 120px; padding: 1rem; resize: none; margin-bottom: 1.5rem;" placeholder="Write daily reminders or specific details here... ">${existing}</textarea>
            <div style="display: flex; justify-content: flex-end; gap: 1rem;">
                <button type="button" class="btn" onclick="document.getElementById('date-note-modal').style.display='none'" style="background: rgba(255,255,255,0.05); color: var(--text-main);">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="localStorage.setItem('${noteKey}', document.getElementById('note-input').value); document.getElementById('date-note-modal').style.display='none'; window.renderCalendar(window.currentCalDate.getFullYear(), window.currentCalDate.getMonth());">Save Note</button>
            </div>
        </div>
    `;
    modal.style.display = 'flex';
    if (window.lucide) lucide.createIcons();
};

window.renderCalendar = async function(year, month) {
    if (!window.sriLankaHolidays[year]) {
        try {
            const res = await fetch('https://date.nager.at/api/v3/PublicHolidays/' + year + '/LK');
            if (res.ok) {
                const data = await res.json();
                window.sriLankaHolidays[year] = {};
                data.forEach(h => { window.sriLankaHolidays[year][h.date] = h.name; });
            }
        } catch(e) { console.error('Holidays API failed', e); }
    }
    
    const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    const titleEl = document.getElementById('calendar-month-title');
    if (!titleEl) return;
    
    titleEl.textContent = monthNames[month] + " " + year;
    
    let totalSalary = 0;
    mockEmployees.forEach(e => {
        if(e.payroll) {
            totalSalary += e.payroll.basic + (e.payroll.otHours * e.payroll.otRate) - e.payroll.deductions;
        }
    });
    
    document.getElementById('cal-kpi-salary').textContent = "Rs. " + totalSalary.toLocaleString();
    document.getElementById('cal-kpi-staff').textContent = localStorage.getItem('kpi_staff') || '124';
    document.getElementById('cal-kpi-quotes').textContent = localStorage.getItem('kpi_quotations') || '45';
    
    const grid = document.getElementById('calendar-grid');
    if(!grid) return;
    
    grid.innerHTML = '';
    const days = ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'];
    days.forEach(d => {
        grid.innerHTML += '<div style="text-align: center; font-size: 0.7rem; color: var(--text-muted); font-weight: bold; margin-bottom: 0.5rem;">' + d + '</div>';
    });
    
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    
    for (let i = 0; i < firstDay; i++) {
        grid.innerHTML += '<div></div>';
    }
    
    for (let i = 1; i <= daysInMonth; i++) {
        const dateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(i).padStart(2, '0');
        const isHoliday = window.sriLankaHolidays[year] && window.sriLankaHolidays[year][dateStr];
        const holidayName = isHoliday ? window.sriLankaHolidays[year][dateStr].replace(/'/g, "") : '';
        const hasNote = localStorage.getItem('note_' + dateStr);
        
        let bg = 'rgba(255,255,255,0.02)';
        let border = '1px solid var(--border-glass)';
        let badge = '';
        
        const today = new Date();
        if (today.getFullYear() === year && today.getMonth() === month && today.getDate() === i) {
            border = '1px solid var(--primary)';
            bg = 'rgba(6,182,212,0.1)';
        }
        
        if (isHoliday) {
            bg = 'rgba(239,68,68,0.15)';
            border = '1px solid rgba(239,68,68,0.3)';
        }
        
        if (hasNote) {
            badge = '<div style="position: absolute; bottom: 2px; right: 2px; width: 6px; height: 6px; background: var(--primary); border-radius: 50%;"></div>';
        }
        
        grid.innerHTML += `
            <div onclick="window.openDateNote('${dateStr}', ${!!isHoliday}, '${holidayName}')" style="aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: ${bg}; border: ${border}; border-radius: 4px; cursor: pointer; position: relative; font-size: 0.85rem; transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='${bg}'" title="${isHoliday?holidayName:''}">
                ${i}

function navigate(hashPath) {
    if (!hashPath.startsWith('#')) {
        hashPath = '#' + hashPath;
    }
    window.location.hash = hashPath;
}

function handleRoute() {
    let hash = window.location.hash;
    // Handle root / empty hash
    if (!hash || hash === '#') {
        hash = '#/';
    }
    
    const view = routes[hash] || routes['#/'];
    view();
    
    if (window.lucide) {
        lucide.createIcons();
    }
}

            <h1 style="font-size: 1.8rem; margin-bottom: 0.25rem;">Admin Settings</h1>

            <h3 style="margin-bottom: 1.5rem; font-size: 1.2rem; display: flex; align-items: center; gap: 0.5rem;"><i data-lucide="sliders" style="color: var(--primary);"></i> Dashboard Overrides</h3>
            <form id="settings-form">

                    <label class="form-label">Total Staff Count</label>
                    <input type="number" id="set-staff" class="form-input" value="${totalStaff}" style="padding-left: 1rem;" required />

                <div class="form-group">
                    <label class="form-label">Present Today</label>
                    <input type="number" id="set-present" class="form-input" value="${presentToday}" style="padding-left: 1rem;" required />

                <div class="form-group">
                    <label class="form-label">Active Sites</label>
                    <input type="number" id="set-sites" class="form-input" value="${activeSites}" style="padding-left: 1rem;" required />

                <div class="form-group">
                    <label class="form-label">Quotations Sent (Current Month)</label>
                    <input type="number" id="set-quotes" class="form-input" value="${quotations}" style="padding-left: 1rem;" required />

                <div style="margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Save Configuration</button>

    document.getElementById('settings-form').addEventListener('submit', e => {

        localStorage.setItem('kpi_staff', document.getElementById('set-staff').value);

        msg.style.display = 'block';
        setTimeout(() => msg.style.display = 'none', 3000);
    });
}

function renderInventory() {
    const root = document.getElementById('app-root');
    const items = window.getInventory();
    const lowStockCount = items.filter(i => i.quantity <= i.minThreshold).length;

    const tableRows = items.map(item => {
        const isLow = item.quantity <= item.minThreshold;
        const statusText = item.quantity === 0 ? 'Out of Stock' : (isLow ? 'Low Stock' : 'In Stock');
        const statusColor = item.quantity === 0 ? 'var(--danger)' : (isLow ? 'var(--warning)' : 'var(--success)');
        const statusBg = item.quantity === 0 ? 'rgba(239,68,68,0.1)' : (isLow ? 'rgba(245,158,11,0.1)' : 'rgba(16,185,129,0.1)');

        return `
            <tr class="inventory-row" data-category="${item.category}" style="border-bottom: 1px solid var(--border-glass);">
                <td style="padding: 1.25rem 0.5rem; font-weight: 600;">${item.id}</td>
                <td style="padding: 1.25rem 0.5rem; color: var(--text-main); font-weight: 500;">${item.name}</td>
                <td style="padding: 1.25rem 0.5rem; color: var(--text-muted); font-size: 0.85rem;">${item.category}</td>
                <td style="padding: 1.25rem 0.5rem; font-weight: 700;">${item.quantity} ${item.unit}</td>
                <td style="padding: 1.25rem 0.5rem;">
                    <span style="background: ${statusBg}; color: ${statusColor}; padding: 0.25rem 0.6rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; border: 1px solid ${statusColor}44;">
                        ${statusText}
                    </span>
                </td>
                <td style="padding: 1.25rem 0.5rem; color: var(--text-muted); font-size: 0.85rem;">${item.lastRestocked}</td>
                <td style="padding: 1.25rem 0.5rem; text-align: right;">
                    <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 0.25rem;">
                        <button class="icon-btn" onclick="window.updateStock('${item.id}', 1)" title="Increase Stock" style="padding: 0.2rem;"><i data-lucide="plus-circle" style="width: 18px; height: 18px;"></i></button>
                        <button class="icon-btn" onclick="window.updateStock('${item.id}', -1)" title="Decrease Stock" style="padding: 0.2rem;"><i data-lucide="minus-circle" style="width: 18px; height: 18px;"></i></button>
                    </div>
                </td>
            </tr>
        `;
    }).join('');

    const content = `
        <div style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <h1 style="font-size: 1.8rem; margin-bottom: 0.25rem;">Inventory Management</h1>
                <p style="color: var(--text-muted);">Track supplies, equipment, and safety gear in real-time.</p>
            </div>
            <button class="btn btn-primary" onclick="window.showAddItemModal()">
                <i data-lucide="package-plus" style="width: 18px; height: 18px;"></i>
                <span>Add Item</span>
            </button>
        </div>

        <div class="grid-cards" style="margin-bottom: 2rem;">
            <div class="stat-card">
                <div class="stat-icon cyan"><i data-lucide="package"></i></div>
                <div class="stat-info">
                    <h4>Total Items</h4>
                    <h2>${items.length}</h2>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon ${lowStockCount > 0 ? 'orange' : 'green'}"><i data-lucide="alert-triangle"></i></div>
                <div class="stat-info">
                    <h4>Low Stock Alerts</h4>
                    <h2 style="color: ${lowStockCount > 0 ? 'var(--warning)' : 'var(--success)'};">${lowStockCount}</h2>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon blue"><i data-lucide="refresh-cw"></i></div>
                <div class="stat-info">
                    <h4>Recently Updated</h4>
                    <h2>2</h2>
                </div>
            </div>
        </div>

        <div class="glass-card" style="padding: 2rem;">
            <div style="display: flex; gap: 1rem; margin-bottom: 2rem; align-items: center; flex-wrap: wrap;">
                <div class="header-search" style="flex: 1; min-width: 250px;">
                    <i data-lucide="search" class="input-icon"></i>
                    <input type="text" placeholder="Search items..." class="search-input" onkeyup="const v=this.value.toLowerCase(); document.querySelectorAll('.inventory-row').forEach(r => r.style.display = r.innerText.toLowerCase().includes(v) ? '' : 'none')" />
                </div>
                <select class="form-input" style="width: auto; appearance: auto; cursor: pointer; padding-left: 1rem;" onchange="const v=this.value; document.querySelectorAll('.inventory-row').forEach(r => r.style.display = (v === 'All' || r.dataset.category === v) ? '' : 'none')">
                    <option value="All">All Categories</option>
                    <option value="Consumables">Consumables</option>
                    <option value="Equipment">Equipment</option>
                    <option value="Safety">Safety</option>
                </select>
            </div>

            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead>
                        <tr style="border-bottom: 1px solid var(--border-glass); color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase;">
                            <th style="padding: 1rem 0.5rem; font-weight: 600;">ID</th>
                            <th style="padding: 1rem 0.5rem; font-weight: 600;">Item Name</th>
                            <th style="padding: 1rem 0.5rem; font-weight: 600;">Category</th>
                            <th style="padding: 1rem 0.5rem; font-weight: 600;">Stock Level</th>
                            <th style="padding: 1rem 0.5rem; font-weight: 600;">Status</th>
                            <th style="padding: 1rem 0.5rem; font-weight: 600;">Last Updated</th>
                            <th style="padding: 1rem 0.5rem; font-weight: 600; text-align: right;">Action</th>
                        </tr>
                    </thead>
                    <tbody>${tableRows}</tbody>
                </table>
            </div>
        </div>
    `;
    root.innerHTML = renderLayout(content, 'inventory');
    if (window.lucide) lucide.createIcons();
}

window.updateStock = function(id, amount) {
    const items = window.getInventory();
    const item = items.find(i => i.id === id);
    if (item) {
        item.quantity = Math.max(0, item.quantity + amount);
        item.lastRestocked = new Date().toISOString().split('T')[0];
        localStorage.setItem('inventory_data', JSON.stringify(items));
        renderInventory();
    }
};

        document.body.appendChild(modal);
    }
    
    modal.innerHTML = `
        <div class="glass-card animate-slide-up" style="width: 100%; max-width: 450px; padding: 2.5rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid var(--border-glass); padding-bottom: 1rem;">
                <h3 style="font-size: 1.25rem;">Add New Inventory Item</h3>
                <button type="button" onclick="document.getElementById('inventory-modal').remove()" class="icon-btn"><i data-lucide="x"></i></button>
            </div>
            <form id="add-inventory-form">
                <div class="form-group">
                    <label class="form-label">Item Name</label>

                    </div>

                        <label class="form-label">Unit</label>
                        <input type="text" id="inv-unit" class="form-input" placeholder="Liters / Pcs" style="padding-left: 1rem;" required />

                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">

                        <input type="number" id="inv-qty" class="form-input" value="0" style="padding-left: 1rem;" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Min Threshold</label>
                        <input type="number" id="inv-min" class="form-input" value="5" style="padding-left: 1rem;" required />
                    </div>
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-glass);">
                    <button type="button" class="btn" onclick="document.getElementById('inventory-modal').remove()" style="background: transparent; border: 1px solid var(--border-glass); color: var(--text-main);">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="padding: 0.75rem 2rem;">Save Item</button>
                </div>
            </form>
        </div>
    `;
    
    if (window.lucide) lucide.createIcons();
    
    document.getElementById('add-inventory-form').addEventListener('submit', e => {
        e.preventDefault();
        const items = window.getInventory();
        const newItem = {
            id: 'INV' + String(items.length + 1).padStart(3, '0'),
            name: document.getElementById('inv-name').value,
            category: document.getElementById('inv-category').value,
            quantity: parseFloat(document.getElementById('inv-qty').value) || 0,
            unit: document.getElementById('inv-unit').value,
            minThreshold: parseFloat(document.getElementById('inv-min').value) || 0,
            lastRestocked: new Date().toISOString().split('T')[0]
        };

function renderCashBook() {
    const root = document.getElementById('app-root');
    const entries = window.getCashBook();
    
    let totalIncome = 0;
    let totalExpense = 0;
    let runningBalance = 0;

    const tableRows = entries.map(entry => {
        runningBalance = runningBalance + (entry.income || 0) - (entry.expense || 0);
        totalIncome += (entry.income || 0);
        totalExpense += (entry.expense || 0);

        return `
            <tr style="border-bottom: 1px solid var(--border-glass);">
                <td style="padding: 1.25rem 0.5rem; color: var(--text-muted); font-size: 0.9rem;">${entry.date}</td>
                <td style="padding: 1.25rem 0.5rem; font-weight: 500;">${entry.description}</td>
                <td style="padding: 1.25rem 0.5rem; color: var(--success); font-weight: 600;">${entry.income > 0 ? 'Rs. ' + entry.income.toLocaleString() : '-'}</td>
                <td style="padding: 1.25rem 0.5rem; color: var(--danger); font-weight: 600;">${entry.expense > 0 ? 'Rs. ' + entry.expense.toLocaleString() : '-'}</td>
                <td style="padding: 1.25rem 0.5rem; font-weight: 700; color: var(--primary);">Rs. ${runningBalance.toLocaleString()}</td>
            </tr>
        `;
    }).join('');

    const content = `
        <div style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <h1 style="font-size: 1.8rem; margin-bottom: 0.25rem;">මුදල් පොත (Cash Book)</h1>
                <p style="color: var(--text-muted);">ඔබගේ දෛනික ලැබීම් සහ ගෙවීම් පවත්වාගෙන යන්න.</p>
            </div>
            <button class="btn btn-primary" onclick="window.showAddCashEntryModal()">
                <i data-lucide="plus-circle" style="width: 18px; height: 18px;"></i>
                <span>නව ඇතුළත් කිරීමක්</span>
            </button>
        </div>

        <div class="grid-cards" style="margin-bottom: 2rem;">
            <div class="stat-card">
                <div class="stat-icon green"><i data-lucide="trending-up"></i></div>
                <div class="stat-info">
                    <h4>මුළු ලැබීම් (Total In)</h4>
                    <h2 style="color: var(--success);">Rs. ${totalIncome.toLocaleString()}</h2>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange"><i data-lucide="trending-down"></i></div>
                <div class="stat-info">
                    <h4>මුළු ගෙවීම් (Total Out)</h4>
                    <h2 style="color: var(--danger);">Rs. ${totalExpense.toLocaleString()}</h2>
                </div>
            </div>
            <div class="stat-card" style="border: 1px solid var(--primary);">
                <div class="stat-icon cyan"><i data-lucide="wallet"></i></div>
                <div class="stat-info">
                    <h4>වත්මන් ශේෂය (Balance)</h4>
                    <h2>Rs. ${runningBalance.toLocaleString()}</h2>
                </div>
            </div>
        </div>

        <div class="glass-card" style="padding: 2rem;">
            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead>
                        <tr style="border-bottom: 1px solid var(--border-glass); color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase;">
                            <th style="padding: 1rem 0.5rem; font-weight: 600;">දිනය (Date)</th>
                            <th style="padding: 1rem 0.5rem; font-weight: 600;">විස්තරය (Description)</th>
                            <th style="padding: 1rem 0.5rem; font-weight: 600;">ලැබීම් (In)</th>
                            <th style="padding: 1rem 0.5rem; font-weight: 600;">ගෙවීම් (Out)</th>
                            <th style="padding: 1rem 0.5rem; font-weight: 600;">ශේෂය (Balance)</th>
                        </tr>
                    </thead>
                    <tbody>${tableRows}</tbody>
                </table>
            </div>
        </div>
    `;
    root.innerHTML = renderLayout(content, 'cashbook');
    if (window.lucide) lucide.createIcons();
}

window.showAddCashEntryModal = function() {
    let modal = document.getElementById('cashbook-modal');
    if (!modal) {
        modal = document.createElement('div');
        modal.id = 'cashbook-modal';
        modal.style = "position: fixed; inset: 0; background: rgba(15,23,42,0.8); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: center; justify-content: center;";
        document.body.appendChild(modal);
    }
    
    modal.innerHTML = `
        <div class="glass-card animate-slide-up" style="width: 100%; max-width: 450px; padding: 2.5rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h3 style="font-size: 1.25rem;">නව ඇතුළත් කිරීමක් (New Entry)</h3>
                <button type="button" onclick="document.getElementById('cashbook-modal').remove()" class="icon-btn"><i data-lucide="x"></i></button>
            </div>
            <form id="add-cash-form">
                <div class="form-group">
                    <label class="form-label">දිනය (Date)</label>
                    <input type="date" id="cash-date" class="form-input" style="padding-left: 1rem; color-scheme: dark;" value="${new Date().toISOString().split('T')[0]}" required />
                </div>
                <div class="form-group">
                    <label class="form-label">විස්තරය (Description)</label>
                    <input type="text" id="cash-desc" class="form-input" placeholder="උදා: අත්තිකාරම් මුදල්" style="padding-left: 1rem;" required />
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label class="form-label">මුදල (Amount)</label>
                        <input type="number" id="cash-amt" class="form-input" placeholder="0.00" style="padding-left: 1rem;" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label">වර්ගය (Type)</label>
                        <select id="cash-type" class="form-input" style="padding-left: 1rem; appearance: auto;" required>
                            <option value="income">ලැබීම් (Income)</option>
                            <option value="expense">ගෙවීම් (Expense)</option>
                        </select>
                    </div>
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-glass);">
                    <button type="button" class="btn" onclick="document.getElementById('cashbook-modal').remove()" style="background: transparent; border: 1px solid var(--border-glass); color: var(--text-main);">අවලංගු කරන්න</button>
                    <button type="submit" class="btn btn-primary" style="padding: 0.75rem 2rem;">සුරකින්න (Save)</button>
                </div>
            </form>
        </div>
    `;
    
    if (window.lucide) lucide.createIcons();
    
    document.getElementById('add-cash-form').addEventListener('submit', e => {
        e.preventDefault();
        const entries = window.getCashBook();
        const type = document.getElementById('cash-type').value;
        const amt = parseFloat(document.getElementById('cash-amt').value) || 0;
        
        const newEntry = {
            date: document.getElementById('cash-date').value,
            description: document.getElementById('cash-desc').value,
            income: type === 'income' ? amt : 0,
            expense: type === 'expense' ? amt : 0
        };
        
        entries.push(newEntry);
        localStorage.setItem('cashbook_data', JSON.stringify(entries));
        document.getElementById('cashbook-modal').remove();
        renderCashBook();
    });
};

// --- SETUP ROUTER ---
const routes = {
    '': renderLogin,
    '#/': renderLogin,
    '#/dashboard': renderDashboard,
    '#/staff': renderStaffRegister,
    '#/staff/new': renderAddStaff,
    '#/payroll': renderPayroll,
    '#/settings': renderSettings,
    '#/inventory': renderInventory,
    '#/cashbook': renderCashBook
};

// --- INITIALIZE ---
if (document.readyState === 'complete' || document.readyState === 'interactive') {
    handleRoute();
} else {
    document.addEventListener('DOMContentLoaded', handleRoute);
}
window.addEventListener('hashchange', handleRoute);

document.body.addEventListener('click', e => {
    const linkElement = e.target.closest('[data-link]');
    if (linkElement) {
        e.preventDefault();
        const href = linkElement.getAttribute('href');
        navigate(href);
    }
});

</script>
